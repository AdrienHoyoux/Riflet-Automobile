services:
  db:
    image: mysql:8.0
    container_name: riflet_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-riflet_db}
      MYSQL_USER: ${MYSQL_USER:-riflet_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-riflet_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: riflet_backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_HOST: db
      DATABASE_PORT: "3306"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-riflet_db}
      MYSQL_USER: ${MYSQL_USER:-riflet_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      CONTACT_EMAIL: ${CONTACT_EMAIL}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: riflet_frontend
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-https://hoyouxcorp.tech}
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-https://hoyouxcorp.tech}
      NUXT_API_BASE_SERVER: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

volumes:
  mysql_data:
  media_data:
  frontend_node_modules:
