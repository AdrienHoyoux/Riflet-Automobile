# Production (Hostinger VPS + Traefik)
#
# Déploiement manuel SSH (recommandé) :
#   git clone … && cp .env.production.example .env && nano .env
#   docker compose -p riflet-automobile --env-file .env up -d --build
#   Voir deploy/HOSTINGER.md et ./deploy/hostinger.sh
#
# Traefik (host mode) : --providers.docker.network=riflet-automobile_default

services:
  db:
    image: mysql:8.0
    container_name: riflet_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-riflet_db}
      MYSQL_USER: ${MYSQL_USER:-riflet_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-riflet_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: riflet_backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_HOST: db
      DATABASE_PORT: "3306"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-rifletautomobile.be,www.rifletautomobile.be,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://rifletautomobile.be,https://www.rifletautomobile.be}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://rifletautomobile.be,https://www.rifletautomobile.be}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-riflet_db}
      MYSQL_USER: ${MYSQL_USER:-riflet_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-riflet_pass}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-hoyouxadrien@gmail.com}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-465}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-False}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-True}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-hoyouxadrien@gmail.com}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-hoyouxadrien@gmail.com}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=riflet-automobile_default
      - traefik.http.routers.riflet-api.rule=(Host(`rifletautomobile.be`) || Host(`www.rifletautomobile.be`)) && (PathPrefix(`/api`) || PathPrefix(`/django-admin`) || PathPrefix(`/static`) || PathPrefix(`/media`))
      - traefik.http.routers.riflet-api.entrypoints=websecure
      - traefik.http.routers.riflet-api.tls=true
      - traefik.http.routers.riflet-api.tls.certresolver=letsencrypt
      - traefik.http.routers.riflet-api.priority=100
      - traefik.http.routers.riflet-api.service=riflet-api
      - traefik.http.services.riflet-api.loadbalancer.server.port=8000

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-https://rifletautomobile.be}
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-https://rifletautomobile.be}
    container_name: riflet_frontend
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-https://rifletautomobile.be}
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-https://rifletautomobile.be}
      NUXT_API_BASE_SERVER: http://backend:8000
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.docker.network=riflet-automobile_default
      # Panneau admin Nuxt (/admin/*) — priorité haute pour ne pas passer par Django
      - traefik.http.routers.riflet-site-admin.rule=(Host(`rifletautomobile.be`) || Host(`www.rifletautomobile.be`)) && PathPrefix(`/admin`)
      - traefik.http.routers.riflet-site-admin.entrypoints=websecure
      - traefik.http.routers.riflet-site-admin.tls=true
      - traefik.http.routers.riflet-site-admin.tls.certresolver=letsencrypt
      - traefik.http.routers.riflet-site-admin.priority=200
      - traefik.http.routers.riflet-site-admin.service=riflet-web
      - traefik.http.routers.riflet-web.rule=Host(`rifletautomobile.be`) || Host(`www.rifletautomobile.be`)
      - traefik.http.routers.riflet-web.entrypoints=websecure
      - traefik.http.routers.riflet-web.tls=true
      - traefik.http.routers.riflet-web.tls.certresolver=letsencrypt
      - traefik.http.routers.riflet-web.priority=1
      - traefik.http.routers.riflet-web.service=riflet-web
      - traefik.http.services.riflet-web.loadbalancer.server.port=3000

volumes:
  mysql_data:
  media_data:

networks:
  default:
    name: riflet-automobile_default
