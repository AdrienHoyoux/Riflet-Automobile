# Developpement local — copiez .env.example vers .env avant de lancer

services:
  db:
    image: mysql:8.0
    container_name: riflet_mysql_dev
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-riflet_db}
      MYSQL_USER: ${MYSQL_USER:-riflet_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-riflet_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
    volumes:
      - mysql_data_dev:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: riflet_backend_dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_HOST: db
      RUN_SEED_DATA: "true"
      PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:3000}
    volumes:
      - ./backend:/app
      - media_data_dev:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: riflet_frontend_dev
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8000
      NUXT_API_BASE_SERVER: http://backend:8000
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:3000}
    volumes:
      - ./frontend:/app
      - frontend_node_modules_dev:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

volumes:
  mysql_data_dev:
  media_data_dev:
  frontend_node_modules_dev:
