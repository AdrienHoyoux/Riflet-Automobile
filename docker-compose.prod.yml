services:
  db:
    image: mysql:8.0
    container_name: riflet_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-riflet_db}
      MYSQL_USER: ${MYSQL_USER:-riflet_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-riflet_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: riflet_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_HOST: db
      DATABASE_PORT: "3306"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
      args:
        NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000}
    container_name: riflet_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NUXT_API_BASE_SERVER: http://backend:8000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
  media_data:
  static_data:
